name: PR VSIX Build

on:
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            pr_number:
                description: "PR number (for manual testing)"
                required: true
                type: string

permissions:
    contents: write

jobs:
    build-vsix:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  set -euo pipefail
                  REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
                  git init .
                  git config --global --add safe.directory "$PWD"
                  git remote add origin "$REPO_URL"
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    git fetch --no-tags --prune --depth=1 origin "refs/pull/${{ github.event.pull_request.number }}/merge"
                    git checkout --force FETCH_HEAD
                  else
                    git fetch --no-tags --prune --depth=1 origin "${{ github.ref }}"
                    git checkout --force ${{ github.sha }}
                  fi

            - name: Verify Node.js
              run: node -v && npm -v

            - name: Determine version
              id: version
              run: |
                  set -euo pipefail
                  BASE_VERSION=$(jq -r '.version' package.json)
                  PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
                  PR_VERSION="${BASE_VERSION}.pr${PR_NUMBER}"
                  echo "version=${PR_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "base_version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Install dependencies and build VSIX
              env:
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  set -euo pipefail
                  npm install --no-audit --no-fund
                  npx vsce package -o "codex-editor-extension-${VERSION}.vsix"

            - name: Delete prior pre-release for this PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  set -euo pipefail
                  if gh release view "${VERSION}" >/dev/null 2>&1; then
                    gh release delete "${VERSION}" --yes --cleanup-tag
                  fi

            - name: Create pre-release with VSIX
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  set -euo pipefail
                  gh release create "${VERSION}" \
                    "codex-editor-extension-${VERSION}.vsix" \
                    --title "${VERSION}" \
                    --notes "Pre-release build for PR #${{ github.event.pull_request.number || inputs.pr_number }}" \
                    --prerelease
