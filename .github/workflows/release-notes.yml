name: Generate and Send Release Notes

on:
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Get PR info
              id: pr
              run: |
                  set -euo pipefail
                  PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/876")
                  echo "number=876" >> "$GITHUB_OUTPUT"
                  echo "ref=$(echo "$PR_DATA" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"

            - name: Checkout PR branch
              run: |
                  set -euo pipefail
                  REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
                  git init .
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git config user.name "github-actions[bot]"
                  git remote add origin "$REPO_URL"
                  git fetch --depth=1 origin "${{ steps.pr.outputs.ref }}"
                  git checkout "${{ steps.pr.outputs.ref }}"

            - name: Setup Node 20
              run: |
                  set -euo pipefail
                  export NVM_DIR="$HOME/.nvm"
                  if [ ! -s "$NVM_DIR/nvm.sh" ]; then
                    curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
                  fi
                  . "$NVM_DIR/nvm.sh"
                  nvm install 20
                  nvm use 20
                  echo "$(dirname "$(which node)")" >> "$GITHUB_PATH"

            - name: Setup pnpm
              run: npm install -g pnpm

            - name: Generate version
              id: version
              run: |
                  set -euo pipefail
                  BASE_VERSION=$(jq -r .version package.json)
                  SHORT_HASH=$(git rev-parse --short HEAD)
                  VERSION="${BASE_VERSION}-pr876-${SHORT_HASH}"
                  NAME=$(jq -r .name package.json)
                  REPO_URL=$(gh repo view --json url -q .url)
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "vsix=${NAME}-${VERSION}.vsix" >> "$GITHUB_OUTPUT"
                  echo "release_url=${REPO_URL}/releases/tag/${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Bump version in package.json
              run: |
                  set -euo pipefail
                  jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > package.json.tmp
                  mv package.json.tmp package.json

            - name: Install dependencies
              run: pnpm install

            - name: Build webviews (if applicable)
              run: |
                  set -euo pipefail
                  if jq -e '.scripts["build:webviews"]' package.json &>/dev/null; then
                    (cd webviews/codex-webviews && pnpm install)
                    pnpm run build:webviews
                  fi

            - name: Production build
              run: pnpm run package

            - name: Package VSIX
              run: xvfb-run -a pnpm dlx @vscode/vsce package --no-dependencies

            - name: Restore package.json
              if: always()
              run: git checkout -- package.json

            - name: Generate release notes
              run: |
                  set -euo pipefail
                  REPO="${{ github.repository }}"
                  REPO_URL="https://github.com/${REPO}"
                  VERSION="${{ steps.version.outputs.version }}"

                  GENERATED_NOTES=$(gh api "repos/${REPO}/releases/generate-notes" \
                    --method POST \
                    --field tag_name="${VERSION}" \
                    --field target_commitish="$(git rev-parse HEAD)" \
                    -q .body)

                  PR_TITLE=$(gh pr view "876" --json title -q .title)
                  printf 'For PR #%s: [%s](%s)\n\n%s\n' \
                    "876" "${PR_TITLE}" "${REPO_URL}/pull/876" \
                    "${GENERATED_NOTES}" > /tmp/release-notes.md

            - name: Create GitHub prerelease
              run: |
                  gh release create "${{ steps.version.outputs.version }}" \
                    --target "$(git rev-parse HEAD)" \
                    --prerelease \
                    --title "${{ steps.version.outputs.version }}" \
                    --notes-file /tmp/release-notes.md \
                    "./${{ steps.version.outputs.vsix }}"

            - name: Comment on PR
              run: |
                  gh pr comment "876" \
                    --body "Pre-release: ${{ steps.version.outputs.version }} ${{ steps.version.outputs.release_url }}"

            - name: Handle failure
              if: failure()
              run: |
                  set -euo pipefail
                  RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  gh pr comment "876" --body "Build failed: ${RUN_URL}" || true
